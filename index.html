<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trakt Watchlist</title>
  <meta name="description" content="A public view of my Trakt watchlist — no account needed." />
  <link rel="preconnect" href="https://api.trakt.tv" />
  <link rel="preconnect" href="https://media.trakt.tv" />
  <noscript><link rel="stylesheet" href="styles.css" /></noscript>
  <script>
    // Cache-busting loader: append a freshness token to local assets so an
    // updated styles.css / config.js / app.js is always fetched after a deploy
    // instead of being served stale from the browser cache. (The page itself
    // is revalidated by GitHub Pages via ETag.)
    (function () {
      var v = Date.now();
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = "styles.css?v=" + v;
      document.head.appendChild(css);
      ["config.js", "app.js"].forEach(function (src) {
        var s = document.createElement("script");
        s.src = src + "?v=" + v;
        s.async = false; // preserve config.js -> app.js execution order
        document.head.appendChild(s);
      });
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 id="title">Watchlist</h1>
      <p id="subtitle" class="subtitle">Loading…</p>
      <p id="version" class="version"></p>
    </div>
  </header>

  <nav class="toolbar">
    <div class="filters" id="filters" role="tablist" aria-label="Filter by type">
      <button class="filter is-active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter" data-filter="movies" role="tab" aria-selected="false">Movies</button>
      <button class="filter" data-filter="series" role="tab" aria-selected="false">Series</button>
      <button class="filter" data-filter="anime" role="tab" aria-selected="false">Anime</button>
    </div>
    <input
      type="search"
      id="search"
      class="search"
      placeholder="Search titles…"
      aria-label="Search titles"
      autocomplete="off"
    />
  </nav>

  <main>
    <div id="status" class="status" role="status"></div>
    <ul id="grid" class="grid" aria-live="polite"></ul>
  </main>

  <footer class="site-footer">
    <p>
      Data from <a id="trakt-profile-link" href="https://trakt.tv" target="_blank" rel="noopener">Trakt</a>.
      Sorted by date added (newest first).
    </p>
  </footer>
</body>
</html>
