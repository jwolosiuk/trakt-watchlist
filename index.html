<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trakt Watchlist</title>
  <meta name="description" content="A public view of my Trakt watchlist — no account needed." />
  <link rel="preconnect" href="https://api.trakt.tv" />
  <link rel="preconnect" href="https://media.trakt.tv" />
  <noscript><link rel="stylesheet" href="styles.css" /></noscript>
  <script>
    // Cache-busting loader: append a freshness token to local assets so an
    // updated styles.css / config.js / app.js is always fetched after a deploy
    // instead of being served stale from the browser cache. (The page itself
    // is revalidated by GitHub Pages via ETag.)
    (function () {
      var v = Date.now();
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = "styles.css?v=" + v;
      document.head.appendChild(css);
      ["config.js", "store.js", "app.js"].forEach(function (src) {
        var s = document.createElement("script");
        s.src = src + "?v=" + v;
        s.async = false; // preserve config.js -> app.js execution order
        document.head.appendChild(s);
      });
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 id="title">Watchlist</h1>
      <p id="subtitle" class="subtitle">Loading…</p>
      <p id="version" class="version"></p>
    </div>
  </header>

  <nav class="toolbar">
    <div class="filters" id="filters" role="tablist" aria-label="Filter by type">
      <button class="filter is-active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter" data-filter="movies" role="tab" aria-selected="false">Movies</button>
      <button class="filter" data-filter="series" role="tab" aria-selected="false">Series</button>
      <button class="filter" data-filter="anime" role="tab" aria-selected="false">Anime</button>
    </div>
    <div class="toolbar-right">
      <input
        type="search"
        id="search"
        class="search"
        placeholder="Search titles…"
        aria-label="Search titles"
        autocomplete="off"
      />
      <button class="pill-btn" id="fav-filter" type="button" hidden aria-pressed="false" title="Show only my favorites">♥ Mine</button>
      <button class="pill-btn" id="admin-btn" type="button" hidden title="Your device & admin tools">⚙ Device</button>
      <div class="views" id="views" role="group" aria-label="View mode">
        <button class="view is-active" data-view="grid" aria-label="Grid view" aria-pressed="true" title="Grid view">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button class="view" data-view="list" aria-label="List view" aria-pressed="false" title="List view">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><rect x="1" y="2" width="3" height="3" rx="0.5"/><rect x="6" y="2.5" width="9" height="2" rx="1"/><rect x="1" y="7" width="3" height="3" rx="0.5"/><rect x="6" y="7.5" width="9" height="2" rx="1"/><rect x="1" y="12" width="3" height="3" rx="0.5"/><rect x="6" y="12.5" width="9" height="2" rx="1"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <div id="filter-banner" class="filter-banner" hidden>
      <span id="filter-banner-text"></span>
      <button id="filter-banner-clear" type="button">Clear</button>
    </div>
    <div id="status" class="status" role="status"></div>
    <ul id="grid" class="grid" aria-live="polite"></ul>
  </main>

  <!-- Admin panel (shown only to admin devices) -->
  <div id="admin-panel" class="admin-panel" hidden role="dialog" aria-modal="true" aria-labelledby="admin-title">
    <div class="admin-card">
      <div class="admin-head">
        <h2 id="admin-title">Devices</h2>
        <button id="admin-close" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>
      <p class="admin-hint" id="admin-this-device"></p>
      <div id="admin-devices" class="admin-devices"></div>
    </div>
    <div class="admin-backdrop" id="admin-backdrop"></div>
  </div>

  <footer class="site-footer">
    <p>
      Data from <a id="trakt-profile-link" href="https://trakt.tv" target="_blank" rel="noopener">Trakt</a>.
      Sorted by date added (newest first).
    </p>
  </footer>
</body>
</html>
